# ============================================================================
# CashMap × ADE — 도커 배포 (2026-07-04)
#   docker compose up -d --build   한 줄로 전체 스택 기동:
#     frontend (nginx :3000) ──/api 프록시──▶ backend (FastAPI :8000) ──▶ ollama (EXAONE)
#     DB는 팀원 공유 Supabase(외부) — backend/.env 의 DATABASE_URL 사용
#
#   * 최초 1회 ollama-init 이 EXAONE 모델(1.6GB)을 볼륨에 내려받는다 (수 분 소요).
#     그동안 백엔드는 룰베이스 폴백으로 동작 → 화면이 비지 않음.
#   * 호스트에 이미 Ollama가 설치돼 있으면(모델 재다운로드 없이 쓰고 싶으면):
#       OLLAMA_URL=http://host.docker.internal:11434 docker compose up -d backend frontend
#   * 구 로컬 Postgres 구성은 docker-compose.legacy.yml 로 보관 (사용 안 함).
# ============================================================================
services:
  ollama:
    image: ollama/ollama
    container_name: cashmap-ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # 최초 1회 EXAONE 모델 풀 (이미 있으면 즉시 종료)
  ollama-init:
    image: ollama/ollama
    container_name: cashmap-ollama-init
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "exaone3.5:2.4b"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cashmap-backend
    env_file:
      - ./backend/.env          # DATABASE_URL(공유 Supabase)·SECRET_KEY·DART 키
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    ports:
      - "8000:8000"             # 디버그용 직접 접근 (화면은 nginx 프록시 사용)
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: cashmap-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_models:
