services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cashmap-db
    environment:
      POSTGRES_USER: cashmap
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: cashmap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashmap -d cashmap_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cashmap-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://cashmap:1234@db:5432/cashmap_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cashmap-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://backend:8000

volumes:
  postgres_data:
