server {
    listen 80;
    server_name _;

    # Windows 도커 바인드 마운트에서 sendfile이 수정된 파일을 stale로 서빙하는 문제 방지
    sendfile off;

    # 정적 프론트 (빌드리스 React — 파일 그대로 서빙)
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시 — 프론트와 같은 오리진이므로 CORS 자체가 발생하지 않음.
    # data.js bootstrap이 같은 오리진 /health를 먼저 프로브해 자동으로 이 경로를 쓴다.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # EXAONE 서사 생성(수십 초) 대기
    }
    location = /health {
        proxy_pass http://backend:8000;
    }
    location = /docs {
        proxy_pass http://backend:8000;
    }
    location = /openapi.json {
        proxy_pass http://backend:8000;
    }
}
